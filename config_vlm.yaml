# Tek VLM config. Hem LM Studio hem llama-server icin.
# Calistirma:
#   python vlm_detect.py                         # asagidaki 'backend' kullanilir
#   python vlm_detect.py --backend llama         # backend'i CLI'dan ez
#   python vlm_detect.py --backend lmstudio
#
# Backend secimi SADECE asagidaki 'backend' alani (veya --backend) ile yapilir.
# Secilen profilin alanlari (base_url, api_key, reload_every_tiles) ortak
# ayarlarin uzerine yazilir. Backend tipini ayri belirtmeye gerek yok; pipeline
# her ikisiyle de OpenAI-uyumlu API uzerinden konusur.

backend: lmstudio          # secenekler: llama | lmstudio

backends:
  lmstudio:
    base_url: "http://127.0.0.1:8081"
    api_key: "lm-studio"
    reload_every_tiles: 100      # LM Studio native unload/load (VRAM sismesini onler)
  llama:
    base_url: "http://127.0.0.1:8080"
    api_key: "llama-server"
    reload_every_tiles: 0        # llama-server'da native reload API yok

# ===================== ORTAK AYARLAR =====================

input: "E:/SASPlanet_250505_[sasplanet.geojamal.com]/haritalarim/kapadokya"
batch: true                      # klasordeki tum GeoTIFF'leri ayri tarayip birlestirir

out_prefix: null
output_root: "workspace/ciktilar"

bands: "auto"
model: "auto"                    # base_url'deki sunucudan yuklu modeli otomatik secer

tile: 1024
overlap: 256
views: "auto"
source_kind: "auto"

prompt_stage1_path: "prompts/cappadocia_stage1.txt"
prompt_stage2_path: "prompts/cappadocia_stage2_review.txt"

gsd_m: 0.3

confidence_threshold: 0.75
max_candidates_per_tile: 3
max_tiles: 0
export_every: 150
resume: true

reload_pause_seconds: 5
timeout: 240
temperature: 0.0
log_level: "INFO"

featureless_std_threshold: 4.0
cross_tile_iou_threshold: 0.5

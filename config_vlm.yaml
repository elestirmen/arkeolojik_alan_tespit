# Tek VLM config. Backend secimi burada yapilir.
# Calistirma:
#   python vlm_detect.py
#   python vlm_detect.py --config config_vlm.yaml
#
# IDE'den argumansiz calistirinca vlm_detect.py bu dosyayi okur.
# Backend degistirmek icin sadece asagidaki satiri lmstudio veya llama yapin.
# Sonra ayni backend'i gercekten acmak/kapatmak icin:
#   powershell -ExecutionPolicy Bypass -File scripts/use_vlm_backend.ps1 -Backend status
#   powershell -ExecutionPolicy Bypass -File scripts/use_vlm_backend.ps1 -Backend lmstudio
#   powershell -ExecutionPolicy Bypass -File scripts/use_vlm_backend.ps1 -Backend llama
#
# Iki backend'i ayni anda acik tutmak VRAM/performans sorunlarina yol acabilir.

backend: lmstudio

backends:
  lmstudio:
    base_url: "http://127.0.0.1:1234"      # LM Studio: lms server start --port 1234
    api_key: "lm-studio"
    model: "gemma-4-26b-a4b-it-uncensored-heretic"
    tile: 1024
    overlap: 256
    timeout: 240
    reload_every_tiles: 100                # sadece LM Studio native unload/load icin
    reload_pause_seconds: 5
  llama:
    base_url: "http://127.0.0.1:18080"     # scripts/start_llama_server_gemma4.ps1 varsayilani
    api_key: "llama-server"
    model: "gemma-4-26b-a4b-it-uncensored-heretic"
    tile: 768
    overlap: 192
    timeout: 900
    reload_every_tiles: 0                  # standalone llama-server'da native reload yok
    reload_pause_seconds: 0

# ===================== ORTAK AYARLAR =====================

input: "E:/SASPlanet_250505_[sasplanet.geojamal.com]/haritalarim/kapadokya"
batch: true                      # klasordeki tum GeoTIFF'leri ayri tarayip birlestirir

out_prefix: null
output_root: "workspace/ciktilar"

bands: "auto"
views: "auto"
source_kind: "auto"

prompt_stage1_path: "prompts/cappadocia_stage1.txt"
prompt_stage2_path: "prompts/cappadocia_stage2_review.txt"

gsd_m: 0.3

confidence_threshold: 0.75
max_candidates_per_tile: 3
max_tiles: 0
export_every: 150
resume: true

temperature: 0.0
max_tokens: 512                  # LM Studio'da uzun dusunmeyi sinirlar; eski davranisi denemek icin null yazilabilir
reasoning_mode: "off"            # reasoning/thinking icin niyet: off | on | auto
fail_on_reasoning_only: true     # content bos, reasoning dolu gelirse taramayi erken durdur
log_level: "INFO"

featureless_std_threshold: 4.0
cross_tile_iou_threshold: 0.5

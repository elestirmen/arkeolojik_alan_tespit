# Eski uyumluluk dosyasi: ana/onerilen yol artik config_vlm.yaml icinde
# backend: llama secmektir. Bu dosya dogrudan llama-server profiliyle calismak
# isteyen eski komutlari kirmamak icin tutulur.
#
# VLM-only config for standalone llama.cpp llama-server.
# Start the server first:
#   powershell -ExecutionPolicy Bypass -File scripts/start_llama_server_gemma4.ps1
# Then run:
#   python vlm_detect.py --config config_vlm_llama.yaml
#
# LM Studio'yu ayni anda acik tutmayin; iki backend ayni GPU/VRAM icin
# yaristiginda hiz ve stabilite bozulur.

input: "E:/SASPlanet_250505_[sasplanet.geojamal.com]/haritalarim/kapadokya"
batch: true

out_prefix: null
output_root: "workspace/ciktilar"

bands: "auto"

backend: llama
base_url: "http://127.0.0.1:18080"
api_key: "llama-server"
model: "gemma-4-26b-a4b-it-uncensored-heretic"

tile: 768
overlap: 192
views: "auto"
source_kind: "auto"

prompt_stage1_path: "prompts/cappadocia_stage1.txt"
prompt_stage2_path: "prompts/cappadocia_stage2_review.txt"

gsd_m: 0

confidence_threshold: 0.75
max_candidates_per_tile: 3
max_tiles: 0
export_every: 150
resume: true

# llama-server does not expose LM Studio's native unload/load API.
reload_every_tiles: 0
reload_pause_seconds: 0

timeout: 900
temperature: 0.0
max_tokens: 512
log_level: "INFO"

featureless_std_threshold: 4.0
cross_tile_iou_threshold: 0.5

# IDE-first trained tile-classification profile
# 5-channel tile stack: R, G, B, SVF, SLRM (GeoTIFF bands 1–5). Weights/checkpoints use 5ch, not 12ch.
input: "on_veri/karlik_vadi_rgb_svf_slrm_5band.tif"
weights: "checkpoints/active/model.pth"
training_metadata: "checkpoints/active/training_metadata.json"

enable_deep_learning: true
enable_classic: false
enable_fusion: false
enable_yolo: false

dl_task: "tile_classification"
encoders: "none"
trained_model_only: true
zero_shot_imagenet: false

# Informational only in trained_model_only mode.
tile: 256
overlap: 64
bands: "1,2,3,4,5"

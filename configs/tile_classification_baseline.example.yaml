# Baseline example without a trained checkpoint.
# 5-channel tile stack: R, G, B, SVF, SLRM (GeoTIFF bands 1–5). Weights/checkpoints use 5ch, not 12ch.
input: "workspace/on_veri/karlik_vadi_rgb_svf_slrm_5band.tif"

enable_deep_learning: true
enable_classic: false
enable_fusion: false
enable_yolo: false

dl_task: "tile_classification"
encoders: "none"
trained_model_only: false
zero_shot_imagenet: true
weights: null
training_metadata: null

tile: 256
overlap: 64
bands: "1,2,3,4,5"
